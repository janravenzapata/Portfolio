    <script>tailwind.config = { darkMode: 'class' }</script>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('jrz-theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (savedTheme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.classList.add('dark');
                }
            }
        })();
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" />

        .hover-lift { transition: all 0.3s ease; }
        .hover-lift:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .fade-in { animation: fadeIn 0.4s ease-out both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .stagger > * { animation: fadeIn 0.4s ease-out both; }
        .stagger > *:nth-child(1) { animation-delay: 0s; }
        .stagger > *:nth-child(2) { animation-delay: 0.1s; }
        .stagger > *:nth-child(3) { animation-delay: 0.2s; }
        .stagger > *:nth-child(n+4) { animation-delay: 0.3s; }
        .cert-img-container { width: 100%; height: 224px; overflow: hidden; border-radius: 0.5rem; background: #f3f4f6; border: 1px solid #e5e7eb; margin-bottom: 1.5rem; }

        const itemsPerPage = 6;
        let currentPage = 1;

        function render() {
            const container = document.getElementById('cert-container');
            container.innerHTML = '';

            const start = (currentPage - 1) * itemsPerPage;
            const end   = start + itemsPerPage;
            const pageCerts = certifications.slice(start, end);

            pageCerts.forEach(cert => {
                const card = document.createElement('div');
                card.className = 'bg-white dark:bg-[#111111] p-6 rounded-xl border border-gray-200 dark:border-[#2a2a2a] shadow-sm hover-lift';

                const skillsHTML = `<p class="text-[10px] text-gray-400 dark:text-gray-500 mt-2 font-medium uppercase tracking-wider">Top Skills: ${cert.skills}</p>`;

                if (cert.issuer === "Canva") {
                    card.innerHTML = `
                        <div class="flex items-center justify-between gap-4">
                            <div class="min-w-0">
                                <h2 class="text-lg font-bold text-gray-900 dark:text-white leading-tight mb-1">
                                    <a href="${cert.hyperlink}" target="_blank" class="hover:text-gray-900 dark:hover:text-white transition-colors hover:underline underline-offset-4">${cert.title}</a>
                                </h2>
                                <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">${cert.issuer} • ${cert.date}</p>
                                ${skillsHTML}
                            </div>
                            <div class="badge-small bg-white flex items-center justify-center">
                                <img src="${cert.badge}" class="max-w-full max-h-full object-contain" alt="Badge">
                            </div>
                        </div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="cert-img-container cursor-pointer" onclick="openCertModal('${cert.cert_img}')">
                            <img src="${cert.cert_img}" class="cert-main-img" alt="${cert.title}">
                        </div>
                        <div class="flex items-start justify-between gap-4">
                            <div class="min-w-0">
                                <h2 class="text-lg font-bold text-gray-900 dark:text-white leading-tight mb-1">
                                    <a href="${cert.hyperlink}" target="_blank" class="hover:text-gray-900 dark:hover:text-white transition-colors hover:underline underline-offset-4">${cert.title}</a>
                                </h2>
                                <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">${cert.issuer} • ${cert.date}</p>
                                ${skillsHTML}
                            </div>
                            <div class="badge-small bg-white flex items-center justify-center">
                                <img src="${cert.badge}" class="max-w-full max-h-full object-contain" alt="Badge">
                            </div>
                        </div>
                    `;
                }
                container.appendChild(card);
            });
            renderNumbers();
        }

        function renderNumbers() {
            const nums  = document.getElementById('pagination-numbers');
            nums.innerHTML = '';
            const total = Math.ceil(certifications.length / itemsPerPage);
            for (let i = 1; i <= total; i++) {
                const b = document.createElement('button');
                b.innerText   = i;
                b.className   = `w-10 h-10 rounded-lg transition ${i === currentPage ? 'bg-black text-white dark:bg-white dark:text-black' : 'border border-gray-200 dark:border-[#2a2a2a] hover:bg-gray-100 dark:hover:bg-[#111111]'}`;
                b.onclick     = () => { currentPage = i; render(); window.scrollTo(0, 0); };
                nums.appendChild(b);
            }
        }

        window.openCertModal = (src) => {
            const modal = document.getElementById('certModal');
            document.getElementById('modalImage').src = src;
            modal.classList.replace('hidden', 'flex');
            document.body.style.overflow = 'hidden';
        };

        window.closeCertModal = () => {
            const modal = document.getElementById('certModal');
            modal.classList.replace('flex', 'hidden');
            document.body.style.overflow = 'auto';
        };

        document.getElementById('prev-btn').onclick = () => {
            if (currentPage > 1) { currentPage--; render(); window.scrollTo(0, 0); }
        };
        document.getElementById('next-btn').onclick = () => {
            if (currentPage < Math.ceil(certifications.length / itemsPerPage)) { currentPage++; render(); window.scrollTo(0, 0); }
        };

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeCertModal(); });

        render();

    </script>
